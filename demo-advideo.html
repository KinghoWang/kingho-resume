<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const HUE={"游戏":"#6b3fa0","网服电商":"#c0392b","美妆":"#c0507a","教育培训":"#2471a3","短剧":"#b9770e","健康养生":"#3f6f3f","生活服务":"#8a5a18","小说":"#5d6d7e"};
const SRC={"juliang":["巨量","#111"],"admuse":["妙思","#07c160"]};
const durB=d=>d===0?"图文":d<15?"0-15s":d<30?"15-30s":d<=60?"30-60s":"60s+";
const S={q:"",f:{source:new Set(),industry:new Set(),media:new Set(),mtype:new Set(),dur:new Set(),sell:new Set()},sort:"comp"};
function match(a){
  if(S.q){const q=S.q.toLowerCase();if(!(a.title+a.brand+a.sell.join()+a.all.join()+a.sub).toLowerCase().includes(q))return false;}
  for(const[k,set]of Object.entries(S.f)){if(!set.size)continue;
    if(k==="sell"){if(!a.sell.some(x=>set.has(x)))return false;}
    else if(k==="dur"){if(!set.has(durB(a.duration)))return false;}
    else{const v=k==="source"?a.source:k==="industry"?a.industry:k==="media"?a.media:a.mtype;if(!set.has(v))return false;}}
  return true;}
function sortKey(a){return S.sort==="comp"?a.comp:S.sort==="ctr"?a.ctr:S.sort==="ad_days"?a.ad_days:(a.source==="admuse"?a.exposure:{"A+":5,"A":4,"B+":3,"B":2,"C":1}[a.grade]*1e7+a.pct);}
function results(){let r=ADS.filter(match);r.sort((x,y)=>sortKey(y)-sortKey(x));return r;}
function expLabel(a){return a.source==="admuse"?(a.exposure>=10000?(a.exposure/10000)+"万":a.exposure):`<span class="grade">${a.grade}</span> 超${a.pct}%`;}
function renderFacets(){
  const rs=ADS.filter(match);
  const cnt=(key,val)=>rs.filter(a=>(key==="source"?a.source:key==="industry"?a.industry:key==="media"?a.media:key==="mtype"?a.mtype:durB(a.duration))===val).length;
  const grp=(title,key,vals)=>`<div class="fg"><h4>${title}</h4>`+vals.map(v=>`<span class="chip${S.f[key].has(v)?' on':''}" data-k="${key}" data-v="${v}">${v==="juliang"?"巨量":v==="admuse"?"妙思":v}<span class="n"> ${cnt(key,v)}</span></span>`).join("")+`</div>`;
  const uniq=k=>[...new Set(ADS.map(a=>k==="dur"?durB(a.duration):a[k]))];
  let h=grp("来源","source",["juliang","admuse"]);
  h+=grp("行业","industry",uniq("industry"));
  h+=grp("媒体","media",uniq("media"));
  h+=grp("素材类型","mtype",["视频","图片"]);
  h+=grp("时长","dur",["0-15s","15-30s","30-60s","60s+","图文"]);
  const sells=[...new Set(ADS.flatMap(a=>a.sell))];
  h+=`<div class="fg"><h4>卖点标签</h4>`+sells.map(v=>`<span class="chip${S.f.sell.has(v)?' on':''}" data-k="sell" data-v="${v}">${v}</span>`).join("")+`</div>`;
  $("#facets").innerHTML=h;
}
function card(a){const c=HUE[a.industry]||"#888",s=SRC[a.source];
  return `<div class="cd" data-id="${a.id}"><div class="cov" style="background:linear-gradient(135deg,${c},${c}bb)">
    <span class="mt">${a.mtype}</span><span class="src" style="background:${s[1]}">${s[0]}</span>${a.duration?`<span class="du">${a.duration}s</span>`:''}</div>
    <div class="cb"><div class="t">${a.title}</div><div class="m">${a.brand} · ${a.industry}/${a.sub} · ${a.media}</div>
    <div class="row"><span>曝光 <b>${expLabel(a)}</b></span><span>CTR ${(a.ctr*100).toFixed(1)}%</span><span>在投${a.ad_days}天</span></div></div></div>`;}
function render(){renderFacets();const r=results();$("#cnt").textContent=`${r.length} / ${ADS.length} 条素材`;
  $("#grid").innerHTML=r.map(card).join("")||'<p style="color:var(--mut)">无匹配结果</p>';
  $("#expnote").style.display=S.sort==="exp"?"":"none";}
// SVG helpers
function line(arr,w,h,color,max){max=max||Math.max(...arr,1);const step=w/(arr.length-1||1);
  return `<polyline fill="none" stroke="${color}" stroke-width="1.8" points="${arr.map((v,i)=>`${(i*step).toFixed(1)},${(h-v/max*h).toFixed(1)}`).join(' ')}"/>`;}
function detail(a){const c=HUE[a.industry]||"#888";const q=a.q5;
  const seriesSvg=a.series?`<svg viewBox="0 0 320 90" width="100%" height="90">
    ${line(a.series.click,320,80,'#b9770e')}${line(a.series.ret,320,80,'#c0392b',100)}
    <text x="2" y="10" font-size="9" fill="#b9770e">点击指数</text><text x="60" y="10" font-size="9" fill="#c0392b">流失(留存)</text></svg>`:'<p style="color:var(--mut);font-size:11px">图文素材无秒级时序</p>';
  const wkMax=Math.max(...a.wk,1);
  const wkSvg=`<svg viewBox="0 0 320 60" width="100%" height="60">${line(a.wk,320,50,'#2471a3')}
    ${a.wk.map((v,i)=>`<circle cx="${(i*(320/(a.wk.length-1||1))).toFixed(1)}" cy="${(50-v/wkMax*50).toFixed(1)}" r="2.5" fill="#2471a3"/>`).join('')}</svg>`;
  return `<div class="mh"><div class="cov2" style="background:linear-gradient(135deg,${c},${c}bb)"><span class="du" style="background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:1px 6px;border-radius:3px">${a.duration?a.duration+'s':a.mtype}</span></div>
    <div><h3>${a.title}</h3><div class="sub">${a.brand} · ${a.industry}/${a.sub} · ${a.media} · ${SRC[a.source][0]}源 · 在投 ${a.ad_days} 天（${a.first}~${a.last}）</div>
    <div class="alt">全部标题变体：${a.all.map(t=>'「'+t+'」').join(' ')}</div></div><span class="x" onclick="closeM()">×</span></div>
  <div class="mb">
    <div class="kpi"><div><div class="v">${expLabel(a)}</div><div class="l">曝光（${a.exp_type}）</div></div>
      <div><div class="v">${(a.ctr*100).toFixed(1)}%</div><div class="l">点击率</div></div>
      <div><div class="v">${(a.cvr*100).toFixed(1)}%</div><div class="l">转化率</div></div>
      <div><div class="v">${a.comp}</div><div class="l">综合质量分</div></div></div>
    <div class="sec">五维质量分</div><div class="q5">${Object.entries(q).map(([k,v])=>`<div class="qr"><span class="lab">${k}</span><span class="bar"><i style="width:${(v-80)/20*100}%"></i></span><span>${v}</span></div>`).join('')}</div>
    <div class="sec">多模态解读</div><div class="flow"><span class="pill">${a.presenter}</span><span class="a">→</span><span class="pill">脚本：${a.struct}</span></div>
    <div class="flow"><span style="color:var(--mut);font-size:11px">钩子</span><span class="pill">${a.hook}</span><span style="color:var(--mut);font-size:11px">卖点</span>${a.sell.map(s=>'<span class="pill">'+s+'</span>').join('')}<span style="color:var(--mut);font-size:11px">场景</span>${a.scene.map(s=>'<span class="pill">'+s+'</span>').join('')}</div>
    <div class="sec">秒级互动时序</div>${seriesSvg}
    <div class="sec">受众画像</div>
    <div class="gender"><span class="mn" style="width:${(a.aud.male*100).toFixed(0)}%">男 ${(a.aud.male*100).toFixed(0)}%</span><span class="fn">女 ${((1-a.aud.male)*100).toFixed(0)}%</span></div>
    <div style="margin-top:8px">${a.aud.age.map(([g,v])=>`<div class="audrow"><span class="lab">${g}</span><span class="bar"><i style="width:${(v*100).toFixed(0)}%"></i></span><span>${(v*100).toFixed(0)}%</span></div>`).join('')}</div>
    <div style="font-size:11px;color:var(--mut);margin-top:6px">地域 TOP：${a.aud.region.map(([r,v])=>r+' '+(v*100).toFixed(1)+'%').join(' · ')}</div>
    <div class="sec">周度曝光趋势</div>${wkSvg}
  </div>`;}
function openM(id){const a=ADS.find(x=>x.id===id);$("#modal").innerHTML=detail(a);$("#mask").classList.add("on");}
function closeM(){$("#mask").classList.remove("on");}
$("#q").oninput=e=>{S.q=e.target.value.trim();render();};
$("#sort").onchange=e=>{S.sort=e.target.value;render();};
$("#facets").onclick=e=>{const c=e.target.closest(".chip");if(!c)return;const set=S.f[c.dataset.k];set.has(c.dataset.v)?set.delete(c.dataset.v):set.add(c.dataset.v);render();};
$("#grid").onclick=e=>{const c=e.target.closest(".cd");if(c)openM(c.dataset.id);};
$("#mask").onclick=e=>{if(e.target.id==="mask")closeM();};
render();
</script></body></html>
